      # -- Cross-join queries (one per dataset tier) --
      - id: xjoin-staging
        mode: measure
        sql: >-
          SELECT s.invoice_id, s.issued_ts_sec, l.line_amount
          FROM stg_fin_invoice s
          JOIN stg_fin_invoice_line l ON s.invoice_id = l.invoice_id
          LIMIT 0
      - id: xjoin-ods
        mode: measure
        sql: >-
          SELECT i.interaction_id, c.call_id
          FROM ods_interaction i
          JOIN ods_call c ON CAST(c.call_id AS STRING) = SUBSTR(i.interaction_id, 2)
          LIMIT 0
      - id: xjoin-dm
        mode: measure
        sql: >-
          SELECT f.interaction_id, a.full_name, p.program_name
          FROM fact_interaction f
          JOIN dim_agent a ON a.agent_sk = f.agent_sk
          JOIN dim_program p ON p.program_sk = f.program_sk
          LIMIT 0

  # ================================================================
  # AC9 — Physical-access performance: filtered vs unfiltered scans
  # ================================================================
  - pattern: query_performance
    id: physical-access-perf
    target_dataset: "${BUILD_DATASET}"
    queries:
      - id: perf-fact-interaction
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM fact_interaction"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM fact_interaction WHERE date_key BETWEEN 20240101 AND 20240201 AND channel = 'VOICE'"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
      - id: perf-fact-agent-activity
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM fact_agent_activity"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM fact_agent_activity WHERE agent_sk = 1"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
      - id: perf-fact-queue-interval
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM fact_queue_interval"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM fact_queue_interval WHERE queue_sk = 1"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
      - id: perf-fact-billing-line
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM fact_billing_line"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM fact_billing_line WHERE client_sk = 1 AND program_sk = 1"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
      - id: perf-fact-csat-survey
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM fact_csat_survey"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM fact_csat_survey WHERE program_sk = 1"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
      - id: perf-agg-agent-daily
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM agg_agent_daily"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM agg_agent_daily WHERE agent_sk = 1"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
      - id: perf-agg-billing-monthly
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM agg_billing_monthly"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM agg_billing_monthly WHERE client_sk = 1 AND program_sk = 1"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
      - id: perf-stg-tel-call
        mode: compare
        dry_run: true
        a:
          sql: "SELECT COUNT(*) FROM stg_tel_call"
          dry_run: true
        b:
          sql: "SELECT COUNT(*) FROM stg_tel_call WHERE load_date = '2026-06-02'"
          dry_run: true
        compare:
          bytes_scanned: "b <= a"
