# =============================================================================
# queryability-performance.mvs.yaml — queryability smoke + physical-access perf
# Serves AC6 (queryability smoke) and AC9 (physical-access performance).
# =============================================================================
name: queryability_and_performance

connections:
  target: { engine: bigquery }

migration:
  steps:
    - { kind: ddl, sql: bigquery/ddl/02-staging-sqoop-mirrors.sql }
    - { kind: ddl, sql: bigquery/ddl/03-staging-delta-feeds.sql }
    - { kind: ddl, sql: bigquery/ddl/04-staging-file-feeds.sql }
    - { kind: ddl, sql: bigquery/ddl/05-ods-cleanse.sql }
    - { kind: ddl, sql: bigquery/ddl/06-ods-delta-scd2.sql }
    - { kind: ddl, sql: bigquery/ddl/07-ods-acid.sql }
    - { kind: ddl, sql: bigquery/ddl/08-dm-tables.sql }
    - { kind: ddl, sql: bigquery/ddl/09-dm-views.sql }

